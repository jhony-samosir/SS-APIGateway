services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - GATEWAY_HMAC_SECRET=${GATEWAY_HMAC_SECRET:-dev_secret_key_change_in_production}
      - Jwt__PublicKeyPath=/app/secrets/jwt_public_key.pem
      - ReverseProxy__Clusters__auth-cluster__Destinations__auth-service__Address=http://auth-service:8080
    volumes:
      - ./secrets:/app/secrets:ro
    networks:
      - ss-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  auth-service:
    image: jhony-samosir/ss-authservice:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=auth-db;Database=ss_auth;Username=postgres;Password=postgres
      - Jwt__PrivateKeyPath=/app/secrets/jwt_private_key.pem
      - Jwt__PublicKeyPath=/app/secrets/jwt_public_key.pem
      - GATEWAY_HMAC_SECRET=${GATEWAY_HMAC_SECRET:-dev_secret_key_change_in_production}
    volumes:
      - ./secrets:/app/secrets:ro
    networks:
      - ss-network
    depends_on:
      - auth-db

  auth-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=ss_auth
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - ss-network

networks:
  ss-network:
    driver: bridge

volumes:
  auth-db-data:
