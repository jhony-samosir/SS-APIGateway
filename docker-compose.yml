services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - GATEWAY_HMAC_SECRET=${GATEWAY_HMAC_SECRET:-dev_secret_key_change_in_production}
    volumes:
      - ./secrets/jwt_public_key.pem:/run/secrets/jwt_public_key.pem:ro
    networks:
      - smallmarket-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Mock services for testing
  auth-service:
    image: hashicorp/http-echo
    command: -text='{"message":"Auth Service"}'
    networks:
      - smallmarket-net

  product-service:
    image: hashicorp/http-echo
    command: -text='{"message":"Product Service"}'
    networks:
      - smallmarket-net

networks:
  smallmarket-net:
    driver: bridge
